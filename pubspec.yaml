name: be_fit_real
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  # Versión compatible que no da problemas
  flutter_dotenv: ^6.0.0
  flutter_markdown: ^0.7.7+1
  google_fonts: 5.1.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # 🟢 IMPORTANTE: La indentación exacta es clave aquí
  assets:
    - assets/images/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_con_margen.png" # <--- Tu ruta al logo
  min_sdk_android: 21 # Importante para evitar errores
  adaptive_icon_background: "#1E1E1E" # Color de fondo (Gris oscuro corporativo)
  adaptive_icon_foreground: "assets/images/logo_con_margen.png" # El logo en sí